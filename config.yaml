docusaurus:
  plugin: docusaurus
  options:
    course_name: Hardware Software Interface
    math: true
    sidebar: js
    structure:
      - Introduction: chapters/landing-page/README.md
      - Lab 1 - Number Representation: /build/prepare_view/.view/lab1.md
      - Lab 2 - Memory Operations. Introduction to GDB: /build/prepare_view/.view/lab2.md
      - Lab 4 - Toolchain. GOTO: /build/prepare_view/.view/lab4.md
      - Lab 5 - Introduction to Assembly Language: /build/prepare_view/.view/lab5.md
      - Lab 6 - Registers and Memory Addressing: /build/prepare_view/.view/lab6.md
      - Lab 7 - Structures, vectors and strings: /build/prepare_view/.view/lab7.md
      - Lab 11 - Buffer Management. Buffer Overflow: /build/prepare_view/.view/lab11.md
          
    # static_assets:
      # - slides/Hardware-Software-Interface: /build/make_assets/chapters/hardware-software-interface
      # - slides/Intro-Computer-Architecture: /build/make_assets/chapters/intro-computer-architecture
      # - slides/Memory-Layout: /build/make_assets/chapters/memory-layout
      # - slides/Memory-Security: /build/make_assets/chapters/memory-security
    config_meta:
      title: Hardware Software Interface
      url: http://localhost/
      baseUrl: /hardware-software-interface/
      onBrokenLinks: warn
      onBrokenMarkdownLinks: warn
    config_socials:
      Main site: https://curs.upb.ro
      OCW: https://ocw.cs.pub.ro/courses/pclp2
      Facebook: https://www.facebook.com/10c1a
    copyright_string: OpenEdu Team
